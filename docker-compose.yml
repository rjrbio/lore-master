services:
  backend:
    build:
      context: ./lore-master-backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - ./lore-master-backend/.env
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./lore-master-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
